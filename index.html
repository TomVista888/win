<script>
// ============================================================
// SUPABASE + HELPERS
// ============================================================
const { createClient } = supabase;
const SUPABASE_URL = 'https://heluodmvrwmnwxrtogmc.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhlbHVvZG12cndtbnd4cnRvZ21jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5OTgxNDQsImV4cCI6MjA5MjU3NDE0NH0.RJ64pz_Ad6tJQuZRYJP3QoD-zJFXDRx4GlCrlJbTclo';
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

const fmt = (n, d=2) => n == null ? '-' : Number(n).toFixed(d);
const fmtMoney = (n) => n == null ? '-' : '$' + Number(n).toFixed(2);
const fmtPct = (n) => n == null ? '-' : (Number(n)*100).toFixed(1) + '%';
const todayStr = () => new Date().toISOString().split('T')[0];
const daysAgo = (n) => { const d=new Date(); d.setDate(d.getDate()-n); return d.toISOString().split('T')[0]; };

function getVisibleConfigs(configs, profile, scope='all') {
  if (!profile || profile.role === 'admin' || scope === 'all') return configs || [];
  return (configs || []).filter(c => c.operator_group === profile.group_name);
}

function getVisibleModels(configs, profile, scope='all') {
  return [...new Set(getVisibleConfigs(configs, profile, scope).map(c => c.product_model))];
}

function filterSalesByScope(sales, configs, profile, scope='all') {
  if (!profile || profile.role === 'admin' || scope === 'all') return sales || [];
  const allowed = new Set(getVisibleConfigs(configs, profile, scope).map(c => c.asin_country));
  return (sales || []).filter(s => allowed.has(s.asin_country));
}

function filterAdsByScope(ads, configs, profile, scope='all') {
  if (!profile || profile.role === 'admin' || scope === 'all') return ads || [];
  const allowedModels = new Set(getVisibleModels(configs, profile, scope));
  return (ads || []).filter(a => allowedModels.has(a.product_model));
}

function aggregateDailyProfit(sales, ads) {
  const map = {};
  for (const s of sales || []) {
    const day = s.record_date;
    if (!map[day]) map[day] = { asinProfit: 0, adCost: 0 };
    map[day].asinProfit += Number(s.asin_profit || 0);
  }
  for (const a of ads || []) {
    const day = a.record_date;
    if (!map[day]) map[day] = { asinProfit: 0, adCost: 0 };
    map[day].adCost += Number(a.ad_cost || 0) + Number(a.ld_bd_cost || 0);
  }
  return Object.entries(map).sort((a,b)=>a[0].localeCompare(b[0])).map(([date, v]) => ({
    date,
    asinProfit: v.asinProfit,
    adCost: v.adCost,
    netProfit: v.asinProfit - v.adCost
  }));
}

function ChartCard({ title, type, data, options }) {
  const canvasRef = React.useRef(null);
  const chartRef = React.useRef(null);
  React.useEffect(() => {
    if (!canvasRef.current || !data) return;
    destroyChart(chartRef);
    chartRef.current = new Chart(canvasRef.current, { type, data, options: options || { responsive: true, maintainAspectRatio: false } });
    return () => destroyChart(chartRef);
  }, [type, JSON.stringify(data), JSON.stringify(options)]);

  return React.createElement('div', { className: 'card' },
    React.createElement('div', { className: 'card-title' }, title),
    React.createElement('div', { className: 'chart-wrap' },
      React.createElement('canvas', { ref: canvasRef })
    )
  );
}

function InlineChart({ type, data, options, height = 280 }) {
  const canvasRef = React.createRef();
  const chartRef = React.useRef(null);
  React.useEffect(() => {
    if (!canvasRef.current || !data) return;
    destroyChart(chartRef);
    chartRef.current = new Chart(canvasRef.current, { type, data, options: options || { responsive: true, maintainAspectRatio: false } });
    return () => destroyChart(chartRef);
  }, [type, JSON.stringify(data), JSON.stringify(options)]);

  return React.createElement('div', { className: 'chart-wrap', style: { height } },
    React.createElement('canvas', { ref: canvasRef })
  );
}

function calcRemainingProfit(cfg) {
  if (!cfg) return 0;
  const net = cfg.list_price * (1 - (cfg.discount_rate||0));
  const commission = net * (cfg.platform_commission_rate||0.15);
  const adCost = net * (cfg.ad_cost_rate||0);
  const afterSale = net * (cfg.after_sale_rate||0);
  const online = commission + adCost + (cfg.storage_cost||0) + afterSale + (cfg.shipping_cost||0);
  const offline = (cfg.purchase_cost||0) + (cfg.freight_cost||0);
  return net - online - offline;
}

function calcProfitBreakdown(cfg) {
  if (!cfg) return null;
  const listPrice = Number(cfg.list_price || 0);
  const discountRate = Number(cfg.discount_rate || 0);
  const netPrice = Number(cfg.net_price || (listPrice * (1 - discountRate)));
  const platformCommissionRate = Number(cfg.platform_commission_rate || 0.15);
  const commissionAmount = Number(cfg.commission_amount || (netPrice * platformCommissionRate));
  const adCostRate = Number(cfg.ad_cost_rate || 0);
  const adCostAmount = Number(cfg.ad_cost_amount || (netPrice * adCostRate));
  const shippingCost = Number(cfg.shipping_cost || 0);
  const shippingCostRate = netPrice > 0 ? shippingCost / netPrice : 0;
  const storageCost = Number(cfg.storage_cost || 0);
  const storageCostRate = netPrice > 0 ? storageCost / netPrice : 0;
  const afterSaleRate = Number(cfg.after_sale_rate || 0);
  const afterSaleAmount = netPrice * afterSaleRate;
  const onlineCostTotal = commissionAmount + adCostAmount + shippingCost + storageCost + afterSaleAmount;
  const orderRevenue = netPrice - onlineCostTotal;
  const orderRevenueRate = netPrice > 0 ? orderRevenue / netPrice : 0;
  const purchaseCost = Number(cfg.purchase_cost || 0);
  const purchaseCostRate = netPrice > 0 ? purchaseCost / netPrice : 0;
  const freightCost = Number(cfg.freight_cost || 0);
  const freightCostRate = netPrice > 0 ? freightCost / netPrice : 0;
  const offlineCostTotal = purchaseCost + freightCost;
  const remainingProfit = netPrice - onlineCostTotal - offlineCostTotal;
  const remainingProfitRate = netPrice > 0 ? remainingProfit / netPrice : 0;

  return {
    listPrice,
    discountRate,
    netPrice,
    platformCommissionRate,
    commissionAmount,
    adCostRate,
    adCostAmount,
    shippingCost,
    shippingCostRate,
    storageCost,
    storageCostRate,
    afterSaleRate,
    afterSaleAmount,
    onlineCostTotal,
    orderRevenue,
    orderRevenueRate,
    purchaseCost,
    purchaseCostRate,
    freightCost,
    freightCostRate,
    offlineCostTotal,
    remainingProfit,
    remainingProfitRate
  };
}

function destroyChart(ref) {

// LOGIN PAGE
// ============================================================
function LoginPage({ onLogin }) {
  const [email, setEmail] = React.useState('');
  const [password, setPassword] = React.useState('');
  const [loading, setLoading] = React.useState(false);
  const [error, setError] = React.useState('');

  async function handleLogin(e) {
    e.preventDefault();
    setLoading(true); setError('');
    try {
      const { data, error: authErr } = await sb.auth.signInWithPassword({ email, password });
      if (authErr) throw authErr;
      const { data: profile, error: pErr } = await sb.from('users').select('*').eq('id', data.user.id).single();
      if (pErr) {
        const { data: np, error: cErr } = await sb.from('users').insert({
          id: data.user.id, email: data.user.email,
          name: data.user.email.split('@')[0], role: 'operator'
        }).select().single();
        if (cErr) throw cErr;
        onLogin(data.user, np);
      } else {
        onLogin(data.user, profile);
      }
    } catch(err) {
      setError(err.message || '登录失败，请检查邮箱和密码');
    } finally { setLoading(false); }
  }

  return React.createElement('div', { className: 'login-page' },
    React.createElement('div', { className: 'login-card' },
      React.createElement('div', { className: 'login-logo' },
        React.createElement('div', { className: 'logo-big' }, 'A'),
        React.createElement('h1', null, '专业Amazon卖家利润统计系统'),
        React.createElement('p', null, '来财啦利润计算系统')
      ),
      error && React.createElement('div', { className: 'error-msg' }, error),
      React.createElement('form', { className: 'login-form', onSubmit: handleLogin },
        React.createElement('div', { className: 'form-group' },
          React.createElement('label', null, '邮箱地址'),
          React.createElement('input', { className: 'form-control', type: 'email', value: email, onChange: e=>setEmail(e.target.value), placeholder: '请输入邮箱', required: true })
        ),
        React.createElement('div', { className: 'form-group' },
          React.createElement('label', null, '密码'),
          React.createElement('input', { className: 'form-control', type: 'password', value: password, onChange: e=>setPassword(e.target.value), placeholder: '请输入密码', required: true })
        ),
        React.createElement('button', { className: 'login-btn', type: 'submit', disabled: loading }, loading ? '登录中...' : '登录')
      )
    )
  );
}

function AppLayout({ user, profile, onLogout }) {
  const [page, setPage] = React.useState(profile.role === 'admin' ? 'dashboard' : 'group-dashboard');

  const navItems = [
    { id: 'dashboard', label: '数据仪表盘', icon: '📊', admin: true },
    { id: 'group-dashboard', label: '分组仪表盘', icon: '📈', admin: false },

function DashboardPage({ profile, scope = 'all' }) {
  const [period, setPeriod] = React.useState(7);
  const [customDate, setCustomDate] = React.useState('');
  const [loading, setLoading] = React.useState(true);
  const [stats, setStats] = React.useState(null);

  React.useEffect(() => { loadData(); }, [period, customDate, profile?.group_name, profile?.role, scope]);

  async function loadData() {
    setLoading(true);
    try {
      let salesQuery = sb.from('sales_record').select('*');
      let adQuery = sb.from('ad_expense').select('*');
      if (customDate) {
        salesQuery = salesQuery.eq('record_date', customDate);
        adQuery = adQuery.eq('record_date', customDate);
      } else {
        const startDate = daysAgo(period - 1);
        salesQuery = salesQuery.gte('record_date', startDate);
        adQuery = adQuery.gte('record_date', startDate);
      }
      const [salesRes, adRes, cfgRes] = await Promise.all([
        salesQuery,
        adQuery,
        sb.from('profit_config').select('asin_country,product_model,operator_group')
      ]);

      const configs = cfgRes.data || [];
      const sales = filterSalesByScope(salesRes.data || [], configs, profile, scope);
      const ads = filterAdsByScope(adRes.data || [], configs, profile, scope);
      const daily = aggregateDailyProfit(sales, ads);

      const totalAsinProfit = sales.reduce((sum, s) => sum + Number(s.asin_profit || 0), 0);
      const totalAdCost = ads.reduce((sum, a) => sum + Number(a.ad_cost || 0) + Number(a.ld_bd_cost || 0), 0);
      const totalProfit = totalAsinProfit - totalAdCost;
      const avgDailyProfit = (customDate ? 1 : period) ? totalProfit / (customDate ? 1 : period) : 0;

      const todayItem = daily.find(d => d.date === todayStr()) || { netProfit: 0 };
      const yesterdayItem = daily.find(d => d.date === daysAgo(1)) || { netProfit: 0 };
      const todayProfit = todayItem.netProfit;
      const yesterdayProfit = yesterdayItem.netProfit;
      const profitChange = yesterdayProfit !== 0 ? ((todayProfit - yesterdayProfit) / Math.abs(yesterdayProfit)) * 100 : 0;

      const productSummary = Object.entries(
        sales.reduce((acc, s) => {
          if (!acc[s.product_model]) acc[s.product_model] = { vol: 0, asinProfit: 0, adSales: 0, totalSales: 0, adCost: 0 };
          acc[s.product_model].vol += Number(s.sales_volume || 0);
          acc[s.product_model].asinProfit += Number(s.asin_profit || 0);
          return acc;
        }, {})
      ).map(([model, data]) => {
        const relatedAds = ads.filter(a => a.product_model === model);
        for (const a of relatedAds) {
          data.adSales += Number(a.ad_sales || 0);
          data.totalSales += Number(a.total_sales || 0);
          data.adCost += Number(a.ad_cost || 0) + Number(a.ld_bd_cost || 0);
        }
        return [model, {
          vol: data.vol,
          profit: data.asinProfit - data.adCost,
          adRatio: data.totalSales > 0 ? data.adSales / data.totalSales : null
        }];
      }).sort((a,b)=>b[1].profit-a[1].profit);

      const salesByDayMap = {};
      for (const s of sales) salesByDayMap[s.record_date] = (salesByDayMap[s.record_date] || 0) + Number(s.sales_volume || 0);
      const ratioByDayMap = {};
      for (const a of ads) {
        const k = a.record_date;
        if (!ratioByDayMap[k]) ratioByDayMap[k] = { adSales: 0, totalSales: 0 };
        ratioByDayMap[k].adSales += Number(a.ad_sales || 0);
        ratioByDayMap[k].totalSales += Number(a.total_sales || 0);
      }

      const topAsins = Object.entries(sales.reduce((acc, s) => {
        acc[s.asin_country] = (acc[s.asin_country] || 0) + Number(s.sales_volume || 0);
        return acc;
      }, {})).sort((a,b)=>b[1]-a[1]).slice(0,20);

      setStats({
        totalProfit, totalAdCost, avgDailyProfit, todayProfit, profitChange, sales, ads, daily, productSummary,
        salesChart: {
          labels: Object.keys(salesByDayMap).sort(),
          values: Object.keys(salesByDayMap).sort().map(k => salesByDayMap[k])
        },
        ratioChart: {
          labels: Object.keys(ratioByDayMap).sort(),
          values: Object.keys(ratioByDayMap).sort().map(k => {
            const v = ratioByDayMap[k];
            return v.totalSales > 0 ? Number(((v.adSales / v.totalSales) * 100).toFixed(2)) : 0;
          })
        },
        topAsins
      });
    } catch (err) {
      showToast('加载数据失败: ' + err.message, 'error');
    } finally {
      setLoading(false);
    }
  }

  if (loading) return React.createElement('div', { className: 'loading' },
    React.createElement('div', { className: 'spinner' }), '加载中...');
  if (!stats) return React.createElement('div', { className: 'empty-state' },
    React.createElement('div', { className: 'empty-icon' }, '📊'),
    React.createElement('p', null, '暂无数据'));

  return React.createElement('div', null,
    React.createElement('div', { className: 'tabs', style: { alignItems: 'center' } },
      React.createElement('input', { type: 'date', className: 'form-control', value: customDate, onChange: e => { setCustomDate(e.target.value); }, style: { width: 160, marginRight: 4, padding: '5px 10px', fontSize: 13 } }),
      React.createElement('button', { className: 'tab' + (!customDate && period === 7 ? ' active' : ''), onClick: () => { setCustomDate(''); setPeriod(7); } }, '近7天'),
      React.createElement('button', { className: 'tab' + (!customDate && period === 15 ? ' active' : ''), onClick: () => { setCustomDate(''); setPeriod(15); } }, '近15天'),
      React.createElement('button', { className: 'tab' + (!customDate && period === 30 ? ' active' : ''), onClick: () => { setCustomDate(''); setPeriod(30); } }, '近30天')
    ),
    React.createElement('div', { className: 'stats-grid' },
      React.createElement('div', { className: 'stat-card' },
        React.createElement('div', { className: 'stat-label' }, '周期总利润'),
        React.createElement('div', { className: 'stat-value text-green' }, fmtMoney(stats.totalProfit)),
        React.createElement('div', { className: 'stat-sub' }, customDate ? customDate + ' 净利润' : '近' + period + '天净利润')
      ),
      React.createElement('div', { className: 'stat-card' },
        React.createElement('div', { className: 'stat-label' }, '平均日利润'),
        React.createElement('div', { className: 'stat-value' }, fmtMoney(stats.avgDailyProfit))
      ),
      React.createElement('div', { className: 'stat-card' },
        React.createElement('div', { className: 'stat-label' }, '周期总广告费'),
        React.createElement('div', { className: 'stat-value text-red' }, fmtMoney(stats.totalAdCost))
      ),
      React.createElement('div', { className: 'stat-card' },
        React.createElement('div', { className: 'stat-label' }, '当天总利润'),
        React.createElement('div', { className: 'stat-value' }, fmtMoney(stats.todayProfit)),
        React.createElement('div', { className: 'stat-change ' + (stats.profitChange >= 0 ? 'up' : 'down') },
          (stats.profitChange >= 0 ? '↑' : '↓') + ' ' + Math.abs(stats.profitChange).toFixed(1) + '%'
        )
      )
    ),
    React.createElement('div', { className: 'charts-grid' },
      React.createElement(ChartCard, {
        title: customDate ? '销量统计（' + customDate + '）' : '销量统计（近' + period + '天）',
        type: 'bar',
        data: {
          labels: stats.salesChart.labels,
          datasets: [{ label: '销量', data: stats.salesChart.values, backgroundColor: '#20b2aa' }]
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
      }),
      React.createElement(ChartCard, {
        title: customDate ? '广告订单占比趋势（' + customDate + '）' : '广告订单占比趋势（近' + period + '天）',
        type: 'line',
        data: {
          labels: stats.ratioChart.labels,
          datasets: [{ label: '广告订单占比', data: stats.ratioChart.values, borderColor: '#8b5cf6', backgroundColor: 'rgba(139,92,246,0.15)', fill: true, tension: 0.35 }]
        },
        options: { responsive: true, maintainAspectRatio: false, scales: { y: { ticks: { callback: value => value + '%' } } } }
      })
    ),
    React.createElement('div', { className: 'charts-grid' },
      React.createElement(ChartCard, {
        title: '前20名ASIN销量占比',
        type: 'doughnut',
        data: {
          labels: stats.topAsins.map(([k]) => k),
          datasets: [{ data: stats.topAsins.map(([,v]) => v), backgroundColor: ['#3b82f6','#22c55e','#f97316','#ef4444','#8b5cf6','#06b6d4','#f43f5e','#eab308','#10b981','#6366f1','#14b8a6','#84cc16','#f59e0b','#ec4899','#0ea5e9','#a855f7','#ef4444','#14b8a6','#64748b','#fb7185'] }]
        },
        options: { responsive: true, maintainAspectRatio: false }
      }),
      React.createElement('div', { className: 'card' },
        React.createElement('div', { className: 'card-title' }, '产品销量汇总'),
        React.createElement('div', { className: 'table-wrap' },
          React.createElement('table', null,
            React.createElement('thead', null,
              React.createElement('tr', null,
                React.createElement('th', null, '产品型号'),
                React.createElement('th', null, '总销量'),
                React.createElement('th', null, '总利润'),
                React.createElement('th', null, '平均广告占比')
              )
            ),
            React.createElement('tbody', null,
              stats.productSummary.length === 0 ?
                React.createElement('tr', null, React.createElement('td', { colSpan: 4, style: { textAlign: 'center', padding: 40, color: '#aaa' } }, '暂无数据')) :
                stats.productSummary.map(([model, data]) =>
                  React.createElement('tr', { key: model },
                    React.createElement('td', { className: 'fw-bold' }, model),
                    React.createElement('td', null, data.vol),
                    React.createElement('td', { className: data.profit >= 0 ? 'text-green' : 'text-red' }, fmtMoney(data.profit)),
                    React.createElement('td', null, data.adRatio == null ? '-' : (data.adRatio * 100).toFixed(1) + '%')
                  )
                )
            )
          )
        )
      )
    )
  );
}

  const [data, setData] = React.useState(null);
  const [summaryMode, setSummaryMode] = React.useState('day');
  const [summaryDate, setSummaryDate] = React.useState(todayStr());
  const [rangeStart, setRangeStart] = React.useState(daysAgo(6));
  const [rangeEnd, setRangeEnd] = React.useState(todayStr());
  const [ratioPeriod, setRatioPeriod] = React.useState(30);
  const [asinPeriod, setAsinPeriod] = React.useState('all');

  React.useEffect(() => { loadModels(); }, []);
  React.useEffect(() => { if (selectedModel) loadData(); }, [selectedModel]);

  async function loadModels() {
    try {
      const { data } = await sb.from('profit_config').select('product_model,operator_group').order('product_model');
      let filtered = data || [];
      if (profile?.role !== 'admin' && profile?.group_name) {
        filtered = filtered.filter(d => d.operator_group === profile.group_name);
      }
      const unique = [...new Set(filtered.map(d => d.product_model))];
      setModels(unique);
      if (unique.length > 0) setSelectedModel(unique[0]);
    } catch (err) {
      showToast('加载失败: ' + err.message, 'error');
    } finally {
      setLoading(false);
    }
  }

  async function loadData() {
    setLoading(true);
    try {
      const [salesRes, adRes] = await Promise.all([
        sb.from('sales_record').select('*').eq('product_model', selectedModel).gte('record_date', daysAgo(120)),
        sb.from('ad_expense').select('*').eq('product_model', selectedModel).gte('record_date', daysAgo(120)),
      ]);
      const sales = salesRes.data || [];
      const ads = adRes.data || [];
      setData({ sales, ads });
    } catch (err) {
      showToast('加载失败: ' + err.message, 'error');

      setLoading(false);
    }
  }

  function getSummaryRange() {
    if (summaryMode === 'day') return { start: summaryDate, end: summaryDate };
    if (summaryMode === 'week') return { start: daysAgo(6), end: todayStr() };
    if (summaryMode === '15') return { start: daysAgo(14), end: todayStr() };
    if (summaryMode === '30') return { start: daysAgo(29), end: todayStr() };

    return { start: summaryDate, end: summaryDate };

function SalesModal({ record, configs, onClose, onSaved }) {

    product_model: record?.product_model || '',
    sales_volume: record?.sales_volume || '',
    locked_profit: record?.locked_profit || '',
  });
  const [saving, setSaving] = React.useState(false);

  // 固定国家列表
  const countries = ['US', 'CA', 'AU'];
  // 根据选中的国家过滤 ASIN 列表
  const filteredConfigs = form.country ? configs.filter(c => c.country === form.country) : configs;

  function handleCountryChange(country) {
    setForm(f => ({...f, country, asin: '', asin_country: '', product_model: '', locked_profit: ''}));
  }

  function handleAsinInput(asin) {
    const asinCountry = asin + '-' + form.country;
    const cfg = configs.find(c => c.asin_country === asinCountry);
    if (cfg) {
      const profit = calcRemainingProfit(cfg);
      setForm(f => ({...f, asin, asin_country: asinCountry, product_model: cfg.product_model, locked_profit: profit.toFixed(2)}));
    } else {
      setForm(f => ({...f, asin, asin_country: form.country ? asinCountry : '', product_model: '', locked_profit: ''}));

        asin: form.asin,

        product_model: form.product_model,

function SalesBulkModal({ configs, onClose, onSaved }) {
  const [text, setText] = React.useState('');
  const [preview, setPreview] = React.useState([]);
  const [date, setDate] = React.useState(todayStr());
  const [saving, setSaving] = React.useState(false);

  function isDateStr(s) {
    return /^\d{4}[-\/]\d{1,2}[-\/]\d{1,2}$/.test(s);
  }

  function normalizeDate(s) {
    const parts = s.replace(/\//g, '-').split('-');
    return parts[0] + '-' + parts[1].padStart(2, '0') + '-' + parts[2].padStart(2, '0');
  }

  function parseText() {
    const lines = text.trim().split('\n').filter(l => l.trim());
    const rows = [];
    for (const line of lines) {
      const trimmed = line.trim();
      // 如果整行只有一个日期，跳过（不作为数据行）
      if (isDateStr(trimmed)) {
        continue;
      }
      const parts = trimmed.split(/[\t\s]+/);
      // 跳过表头行（包含中文或非ASIN格式的文字）
      if (/[一-龥]/.test(trimmed) || /^(日期|ASIN|国家|销量)/i.test(trimmed)) {
        continue;
      }
      // 支持: 日期 ASIN 国家 销量 或 ASIN 国家 销量
      let rowDate, asin, country, vol;
      if (parts.length >= 4 && isDateStr(parts[0])) {
        rowDate = normalizeDate(parts[0]);
        asin = parts[1];
        country = parts[2];
        vol = parts[3];
      } else if (parts.length >= 3) {
        rowDate = date;
        asin = parts[0];
        country = parts[1];
        vol = parts[2];
      } else {
        continue;
      }
      const asinCountry = asin + '-' + country.toUpperCase();
      const cfg = configs.find(c => c.asin_country === asinCountry);
      const profit = cfg ? calcRemainingProfit(cfg) : null;
      rows.push({
        record_date: rowDate,
        asin_country: asinCountry, asin, country: country.toUpperCase(),
        product_model: cfg?.product_model || '-',
        sales_volume: parseInt(vol) || 0,
        locked_profit: profit,
        valid: !!cfg
      });
    }
    setPreview(rows);
  }

  async function handleSave() {
    const valid = preview.filter(r => r.valid);
    if (valid.length === 0) { showToast('没有有效数据', 'error'); return; }
    // 按 asin_country+record_date 去重，保留最后一条
    const deduped = new Map();
    for (const r of valid) {
      deduped.set(r.asin_country + '|' + r.record_date, r);
    }
    const uniqueRows = [...deduped.values()];
    setSaving(true);
    try {
      const payload = uniqueRows.map(r => ({
        asin_country: r.asin_country, asin: r.asin, country: r.country,
        record_date: r.record_date, product_model: r.product_model,
        sales_volume: r.sales_volume, locked_profit: r.locked_profit
      }));
      const { error } = await sb.from('sales_record').upsert(payload, { onConflict: 'asin_country,record_date' });
      if (error) throw error;
      showToast('批量录入成功，共' + uniqueRows.length + '条');
      onSaved();
    } catch (err) {
      showToast('保存失败: ' + err.message, 'error');
    } finally {
      setSaving(false);
    }
  }
  
  return React.createElement(Modal, {
    title: '批量录入销量数据',
    onClose,
    large: true,
    footer: React.createElement('div', { className: 'flex-gap' },
      React.createElement('button', { className: 'btn btn-secondary', onClick: onClose }, '取消'),
      React.createElement('button', { className: 'btn btn-secondary', onClick: parseText }, '解析预览'),
      React.createElement('button', { className: 'btn btn-primary', onClick: handleSave, disabled: saving || preview.filter(r=>r.valid).length === 0 }, saving ? '保存中...' : '确认导入')
    )
  },
    React.createElement('div', { className: 'form-group', style: { marginBottom: 16 } },
      React.createElement('label', null, '录入日期'),
      React.createElement('input', { type: 'date', className: 'form-control', value: date, onChange: e => setDate(e.target.value), style: { maxWidth: 200 } })
    ),
    React.createElement('div', { className: 'form-group', style: { marginBottom: 16 } },
      React.createElement('label', null, '粘贴数据 (支持以下格式，每行一条)'),
      React.createElement('div', { style: { fontSize: 11, color: '#888', marginBottom: 6 } },
        '格式1: ASIN 国家 销量（使用上方日期）',
        React.createElement('br'),
        '格式2: 日期 ASIN 国家 销量（每行自带日期）',
        React.createElement('br'),
        '格式3: 单独一行日期，后续行继承该日期'
      ),
      React.createElement('textarea', { className: 'form-control', value: text, onChange: e => setText(e.target.value), placeholder: '2026-04-20\nB0GCCML5FP\tUS\t25\nB0HDDML6GQ\tCA\t10\n\n2026-04-21\nB0GCCML5FP\tUS\t30', style: { minHeight: 120 } })
    ),
    preview.length > 0 && React.createElement('div', null,
      React.createElement('div', { style: { marginBottom: 8, fontSize: 13, color: '#555' } }, '预览 (' + preview.filter(r=>r.valid).length + '/' + preview.length + ' 条有效)'),
      React.createElement('div', { className: 'table-wrap' },
        React.createElement('table', null,
          React.createElement('thead', null,
            React.createElement('tr', null,
              React.createElement('th', null, '日期'),
              React.createElement('th', null, 'ASIN-国家'),
              React.createElement('th', null, '产品型号'),
              React.createElement('th', null, '销量'),
              React.createElement('th', null, '锁定利润'),
              React.createElement('th', null, '状态')
            )
          ),
          React.createElement('tbody', null,
            preview.map((r, i) =>
              React.createElement('tr', { key: i },
                React.createElement('td', null, r.record_date),
                React.createElement('td', null, r.asin_country),
                React.createElement('td', null, r.product_model),
                React.createElement('td', null, r.sales_volume),
                React.createElement('td', null, r.locked_profit != null ? fmtMoney(r.locked_profit) : '-'),
                React.createElement('td', null, r.valid ?
                  React.createElement('span', { className: 'badge badge-green' }, '✓ 有效') :

                )
              )
            )
          )
        )
      )
    )
  );

function AdExpenseBulkModal({ allowedModels, isAdmin, onClose, onSaved }) {
  const [text, setText] = React.useState('');
  const [preview, setPreview] = React.useState([]);
  const [date, setDate] = React.useState(todayStr());
  const [saving, setSaving] = React.useState(false);

  function isDateStr(s) {
    return /^\d{4}[-\/]\d{1,2}[-\/]\d{1,2}$/.test(s);
  }

  function normalizeDate(s) {
    const parts = s.replace(/\//g, '-').split('-');
    return parts[0] + '-' + parts[1].padStart(2, '0') + '-' + parts[2].padStart(2, '0');
  }

  function parseText() {
    const lines = text.trim().split('\n').filter(l => l.trim());
    const rows = [];
    for (const line of lines) {
      const trimmed = line.trim();
      if (isDateStr(trimmed)) continue;
      const parts = trimmed.split(/[\t\s]+/);
      if (/[一-龥]/.test(trimmed) || /^(日期|产品型号|国家|广告)/i.test(trimmed)) continue;

      let rowDate, model, country, adCost, adSales, totalSales, ldBdCost, rank;
      // 顺序: 日期 国家 产品型号 广告花费 LD/BD 广告订单销量 总销量 小类排名
      if (parts.length >= 4 && isDateStr(parts[0])) {
        rowDate = normalizeDate(parts[0]);
        country = parts[1];
        model = parts[2];
        adCost = parts[3];
        ldBdCost = parts[4] || '';
        adSales = parts[5] || '';
        totalSales = parts[6] || '';
        rank = parts[7] || '';
      } else if (parts.length >= 3) {
        rowDate = date;
        country = parts[0];
        model = parts[1];
        adCost = parts[2];
        ldBdCost = parts[3] || '';
        adSales = parts[4] || '';
        totalSales = parts[5] || '';
        rank = parts[6] || '';
      } else {
        continue;
      }

      const modelAllowed = isAdmin || allowedModels.includes(model);
      rows.push({
        record_date: rowDate,
        product_model: model,
        country: country.toUpperCase(),
        ad_cost: parseFloat(adCost) || 0,
        ad_sales: parseInt(adSales) || 0,
        total_sales: parseInt(totalSales) || 0,
        ld_bd_cost: parseFloat(ldBdCost) || 0,
        category_rank: parseInt(rank) || null,
        valid: !!(model && country && modelAllowed),
        error: modelAllowed ? '' : '非本组产品型号'
      });
    }
    setPreview(rows);
  }

  async function handleSave() {
    const valid = preview.filter(r => r.valid);
    if (valid.length === 0) { showToast('没有有效数据', 'error'); return; }
    const deduped = new Map();
    for (const r of valid) {
      deduped.set(r.record_date + '|' + r.product_model + '|' + r.country, r);
    }
    const uniqueRows = [...deduped.values()];
    setSaving(true);
    try {
      const payload = uniqueRows.map(r => ({
        record_date: r.record_date,
        product_model: r.product_model,
        country: r.country,
        ad_cost: r.ad_cost,
        ad_sales: r.ad_sales,
        total_sales: r.total_sales,
        ld_bd_cost: r.ld_bd_cost,
        category_rank: r.category_rank
      }));
      const { error } = await sb.from('ad_expense').upsert(payload, { onConflict: 'record_date,product_model,country' });
      if (error) throw error;
      showToast('批量录入成功，共' + uniqueRows.length + '条');
      onSaved();
    } catch (err) {
      showToast('保存失败: ' + err.message, 'error');
    } finally {
      setSaving(false);
    }
  }

  return React.createElement(Modal, {
    title: '批量录入广告花费',
    onClose,
    large: true,
    footer: React.createElement('div', { className: 'flex-gap' },
      React.createElement('button', { className: 'btn btn-secondary', onClick: onClose }, '取消'),
      React.createElement('button', { className: 'btn btn-secondary', onClick: parseText }, '解析预览'),
      React.createElement('button', { className: 'btn btn-primary', onClick: handleSave, disabled: saving || preview.filter(r=>r.valid).length === 0 }, saving ? '保存中...' : '确认导入')
    )
  },
    React.createElement('div', { className: 'form-group', style: { marginBottom: 16 } },
      React.createElement('label', null, '录入日期'),
      React.createElement('input', { type: 'date', className: 'form-control', value: date, onChange: e => setDate(e.target.value), style: { maxWidth: 200 } })
    ),
    React.createElement('div', { className: 'form-group', style: { marginBottom: 16 } },
      React.createElement('label', null, '粘贴数据 (支持以下格式，每行一条)'),
      React.createElement('div', { style: { fontSize: 11, color: '#888', marginBottom: 6 } },
        '格式1: 国家 产品型号 广告花费 [LD/BD 广告订单销量 总销量 小类排名]（使用上方日期）',
        React.createElement('br'),
        '格式2: 日期 国家 产品型号 广告花费 [LD/BD 广告订单销量 总销量 小类排名]（每行自带日期）'
      ),
      React.createElement('textarea', { className: 'form-control', value: text, onChange: e => setText(e.target.value), placeholder: '2026-04-21\t718\tUS\t50.5\t10\t25\t5.2\t100\n701\tCA\t30.2', style: { minHeight: 120 } })
    ),
    preview.length > 0 && React.createElement('div', null,
      React.createElement('div', { style: { marginBottom: 8, fontSize: 13, color: '#555' } }, '预览 (' + preview.filter(r=>r.valid).length + '/' + preview.length + ' 条有效)'),
      React.createElement('div', { className: 'table-wrap' },
        React.createElement('table', null,
          React.createElement('thead', null,
            React.createElement('tr', null,
              React.createElement('th', null, '日期'),
              React.createElement('th', null, '产品型号'),
              React.createElement('th', null, '国家'),
              React.createElement('th', null, '广告费用'),
              React.createElement('th', null, '状态')
            )
          ),
          React.createElement('tbody', null,
            preview.map((r, i) =>
              React.createElement('tr', { key: i },
                React.createElement('td', null, r.record_date),
                React.createElement('td', null, r.product_model),
                React.createElement('td', null, r.country),
                React.createElement('td', null, fmtMoney(r.ad_cost)),
                React.createElement('td', null, r.valid ?
                  React.createElement('span', { className: 'badge badge-green' }, '✓ 有效') :
                  React.createElement('span', { className: 'badge badge-red' }, '✗ ' + (r.error || '缺少必填项'))
                )
              )
            )
          )
        )
      )
    )
  );
}

function ProfitConfigBulkModal({ onClose, onSaved }) {
  const [pastedData, setPastedData] = React.useState('');
  const [parsedRows, setParsedRows] = React.useState([]);
  const [importing, setImporting] = React.useState(false);

  function handleParse() {
    try {
      const lines = pastedData.trim().split('\n');
      if (lines.length < 2) { showToast('请粘贴至少包含表头和一行数据', 'warning'); return; }

      const rows = [];
      for (let i = 1; i < lines.length; i++) {
        const cells = lines[i].split(/\t|,/);
        if (cells.length < 10) continue;

        rows.push({
          asin_country: cells[0]?.trim(),
          asin: cells[1]?.trim(),
          country: cells[2]?.trim(),
          product_model: cells[3]?.trim(),
          operator_group: cells[4]?.trim(),
          list_price: parseFloat(cells[5]) || 0,
          discount_rate: parseFloat(cells[6]) || 0,
          platform_commission_rate: 0.15,
          ad_cost_rate: parseFloat(cells[11]) || 0,
          shipping_cost: parseFloat(cells[12]) || 0,
          storage_cost: parseFloat(cells[14]) || 0,
          after_sale_rate: parseFloat(cells[16]) || 0,
          purchase_cost: parseFloat(cells[21]) || 0,
          freight_cost: parseFloat(cells[23]) || 0
        });
      }

      setParsedRows(rows);
      showToast(`成功解析 ${rows.length} 条数据`);
    } catch (err) {
      showToast('解析失败: ' + err.message, 'error');
    }
  }

  async function handleImport() {
    if (parsedRows.length === 0) { showToast('请先解析数据', 'warning'); return; }
    setImporting(true);
    try {
      let successCount = 0;
      let errorCount = 0;
      let newCount = 0;
      let updateCount = 0;

      // 先查询现有的 ASIN-国家 列表
      const { data: existing } = await sb.from('profit_config').select('asin_country');
      const existingSet = new Set((existing || []).map(e => e.asin_country));

      for (const row of parsedRows) {
        if (!row.asin || !row.country || !row.product_model) {
          errorCount++;
          continue;
        }

        const asinCountry = row.asin_country || `${row.asin}-${row.country}`;
        const isUpdate = existingSet.has(asinCountry);

        const { error } = await sb.from('profit_config').upsert({
          asin_country: asinCountry,
          asin: row.asin,
          country: row.country,
          product_model: row.product_model,
          operator_group: row.operator_group,
          list_price: row.list_price,
          discount_rate: row.discount_rate,
          platform_commission_rate: row.platform_commission_rate,
          ad_cost_rate: row.ad_cost_rate,
          shipping_cost: row.shipping_cost,
          storage_cost: row.storage_cost,
          after_sale_rate: row.after_sale_rate,
          purchase_cost: row.purchase_cost,
          freight_cost: row.freight_cost
        }, { onConflict: 'asin_country' });

        if (error) {
          errorCount++;
          console.error('Import error:', error);
        } else {
          successCount++;
          if (isUpdate) {
            updateCount++;
          } else {
            newCount++;
          }
        }
      }

      showToast(`导入完成：新增 ${newCount} 条，更新 ${updateCount} 条，失败 ${errorCount} 条`);
      if (successCount > 0) onSaved();
    } catch (err) {
      showToast('导入失败: ' + err.message, 'error');
    } finally {
      setImporting(false);
    }
  }

  return React.createElement(Modal, {
    title: '批量导入利润配置',
    onClose,
    large: true,
    footer: React.createElement('div', { className: 'flex-gap' },
      React.createElement('button', { className: 'btn btn-secondary', onClick: onClose }, '取消'),
      React.createElement('button', { className: 'btn btn-secondary', onClick: handleParse, disabled: !pastedData }, '解析数据'),
      React.createElement('button', { className: 'btn btn-primary', onClick: handleImport, disabled: importing || parsedRows.length === 0 },
        importing ? '导入中...' : `导入 ${parsedRows.length} 条`)
    )
  },
    React.createElement('div', { style: { marginBottom: 16, padding: 12, background: '#e6f7ff', border: '1px solid #91d5ff', borderRadius: 6, fontSize: 12, color: '#0050b3' } },
      '从 Excel 复制表格内容（包括表头），粘贴到下方文本框，点击"解析数据"预览，确认无误后点击"导入"。'
    ),
    React.createElement('div', { className: 'form-group' },
      React.createElement('label', null, '粘贴表格数据'),
      React.createElement('textarea', {
        className: 'form-control',
        value: pastedData,
        onChange: e => setPastedData(e.target.value),
        placeholder: '从 Excel 复制表格后粘贴到这里...',
        rows: 10,
        style: { fontFamily: 'monospace', fontSize: 12 }
      })
    ),
    parsedRows.length > 0 && React.createElement('div', { style: { marginTop: 16 } },
      React.createElement('div', { style: { fontWeight: 600, marginBottom: 8 } }, `已解析 ${parsedRows.length} 条数据`),
      React.createElement('div', { className: 'table-wrap', style: { maxHeight: 300, overflow: 'auto' } },
        React.createElement('table', null,
          React.createElement('thead', null,
            React.createElement('tr', null,
              React.createElement('th', null, 'ASIN-国家'),
              React.createElement('th', null, '产品型号'),
              React.createElement('th', null, '运营组'),
              React.createElement('th', null, '前台价格'),
              React.createElement('th', null, '折扣率')
            )
          ),
          React.createElement('tbody', null,
            parsedRows.slice(0, 10).map((row, i) =>
              React.createElement('tr', { key: i },
                React.createElement('td', null, row.asin_country),
                React.createElement('td', null, row.product_model),
                React.createElement('td', null, row.operator_group),
                React.createElement('td', null, fmtMoney(row.list_price)),
                React.createElement('td', null, fmtPct(row.discount_rate))
              )
            ),
            parsedRows.length > 10 && React.createElement('tr', null,
              React.createElement('td', { colSpan: 5, style: { textAlign: 'center', color: '#888' } }, `...还有 ${parsedRows.length - 10} 条`)
            )
          )
        )
      )
    )
  );
}

function UserConfigPage() {

  const [editUser, setEditUser] = React.useState(null);
  
  React.useEffect(() => { loadData(); }, []);
  
  async function loadData() {
    setLoading(true);
    try {
      const { data, error } = await sb.from('users').select('*').order('created_at', { ascending: false });
      if (error) throw error;
      const sorted = (data || []).sort((a, b) => {
        if (a.role === 'admin' && b.role !== 'admin') return -1;
        if (a.role !== 'admin' && b.role === 'admin') return 1;
        const ga = a.group_name || '未分组';
        const gb = b.group_name || '未分组';
        if (ga !== gb) return ga.localeCompare(gb, 'zh-CN');
        return (a.name || '').localeCompare(b.name || '', 'zh-CN');
      });
      setUsers(sorted);
    } catch (err) {
      showToast('加载失败: ' + err.message, 'error');
    } finally {
      setLoading(false);
    }
  }
  
  async function handleDelete(id) {
    if (!confirm('确认删除此用户？')) return;
    const { error } = await sb.from('users').delete().eq('id', id);
    if (error) { showToast('删除失败: ' + error.message, 'error'); return; }
    showToast('删除成功');
    loadData();
  }
  
  const grouped = users.reduce((acc, u) => {
    const key = u.role === 'admin' ? '管理员' : (u.group_name || '未分组');
    if (!acc[key]) acc[key] = [];
    acc[key].push(u);
    return acc;
  }, {});

  const groupOrder = ['管理员', '一组', '二组', '三组', '未分组'];
  const sortedGroups = Object.entries(grouped).sort((a, b) => {
    const ai = groupOrder.indexOf(a[0]);
    const bi = groupOrder.indexOf(b[0]);
    if (ai === -1 && bi === -1) return a[0].localeCompare(b[0], 'zh-CN');
    if (ai === -1) return 1;
    if (bi === -1) return -1;
    return ai - bi;
  });
  
  return React.createElement('div', null,
    React.createElement('div', { className: 'card' },

      ),

      sortedGroups.map(([group, groupUsers]) =>
        React.createElement('div', { key: group, style: { marginBottom: 24 } },
          React.createElement('h3', { style: { fontSize: 15, fontWeight: 600, marginBottom: 12, color: '#555' } }, group + ' (' + groupUsers.length + ')'),
          React.createElement('div', { className: 'table-wrap' },
            React.createElement('table', null,
              React.createElement('thead', null,
                React.createElement('tr', null,
                  React.createElement('th', null, '姓名'),
                  React.createElement('th', null, '邮箱'),
                  React.createElement('th', null, '角色'),
                  React.createElement('th', null, '运营组'),
                  React.createElement('th', null, '创建时间'),
                  React.createElement('th', null, '操作')
                )
              ),
              React.createElement('tbody', null,
                groupUsers.map(u =>
                  React.createElement('tr', { key: u.id },
                    React.createElement('td', { className: 'fw-bold' }, u.name),
                    React.createElement('td', null, u.email),
                    React.createElement('td', null, React.createElement('span', { className: u.role === 'admin' ? 'badge badge-orange' : 'badge badge-blue' }, u.role === 'admin' ? '管理员' : '操作员')),
                    React.createElement('td', null, u.group_name || '-'),
                    React.createElement('td', null, u.created_at ? new Date(u.created_at).toLocaleDateString('zh-CN') : '-'),
                    React.createElement('td', null,
                      React.createElement('div', { className: 'flex-gap' },
                        React.createElement('button', { className: 'btn btn-secondary btn-sm', onClick: () => { setEditUser(u); setShowModal(true); } }, '编辑'),
                        React.createElement('button', { className: 'btn btn-danger btn-sm', onClick: () => handleDelete(u.id) }, '删除')
                      )
                    )
                  )
                )
              )
            )
          )
        )
      )
    ),
    showModal && React.createElement(UserModal, {
      user: editUser,
      onClose: () => setShowModal(false),
      onSaved: () => { setShowModal(false); loadData(); }
    })
  );
}

function UserModal({ user, onClose, onSaved }) {
  const [form, setForm] = React.useState({
    name: user?.name || '',
    email: user?.email || '',
    password: '',
    role: user?.role || 'operator',
    group_name: user?.group_name || '一组',
  });
  const [saving, setSaving] = React.useState(false);

  async function handleSave() {
    if (!form.name || !form.email) { showToast('请填写必填项', 'error'); return; }
    if (!user && !form.password) { showToast('请设置密码', 'error'); return; }
    setSaving(true);
    try {
      if (!user) {
        const { data: authData, error: authErr } = await sb.auth.admin.createUser({
          email: form.email,
          password: form.password,
          email_confirm: true
        });
        if (authErr) throw authErr;
        const { error: dbErr } = await sb.from('users').insert({
          id: authData.user.id,
          email: form.email,
          name: form.name,
          role: form.role,
          group_name: form.group_name
        });
        if (dbErr) throw dbErr;
      } else {
        const { error } = await sb.from('users').update({
          name: form.name,
          role: form.role,
          group_name: form.group_name
        }).eq('id', user.id);
        if (error) throw error;
      }
      showToast(user ? '更新成功' : '添加成功');
      onSaved();
    } catch (err) {
      showToast('保存失败: ' + err.message, 'error');
    } finally {
      setSaving(false);
    }
  }
  
  return React.createElement(Modal, {
    title: user ? '编辑用户' : '添加用户',
    onClose,
    footer: React.createElement('div', { className: 'flex-gap' },
      React.createElement('button', { className: 'btn btn-secondary', onClick: onClose }, '取消'),
      React.createElement('button', { className: 'btn btn-primary', onClick: handleSave, disabled: saving }, saving ? '保存中...' : '保存')
    )
  },
    React.createElement('div', { className: 'form-row' },
      React.createElement('div', { className: 'form-group' },
        React.createElement('label', null, '姓名 *'),
        React.createElement('input', { className: 'form-control', value: form.name, onChange: e => setForm(f => ({...f, name: e.target.value})), placeholder: '请输入姓名' })
      ),
      React.createElement('div', { className: 'form-group' },
        React.createElement('label', null, '邮箱 *'),
        React.createElement('input', { type: 'email', className: 'form-control', value: form.email, onChange: e => setForm(f => ({...f, email: e.target.value})), placeholder: '请输入邮箱', disabled: !!user })
      )
    ),
    !user && React.createElement('div', { className: 'form-row' },
      React.createElement('div', { className: 'form-group' },
        React.createElement('label', null, '密码 *'),
        React.createElement('input', { type: 'password', className: 'form-control', value: form.password, onChange: e => setForm(f => ({...f, password: e.target.value})), placeholder: '请设置登录密码（至少6位）' })
      )
    ),
    React.createElement('div', { className: 'form-row' },
      React.createElement('div', { className: 'form-group' },
        React.createElement('label', null, '角色 *'),
        React.createElement('select', { className: 'form-control', value: form.role, onChange: e => setForm(f => ({...f, role: e.target.value})) },
          React.createElement('option', { value: 'operator' }, '操作员'),
          React.createElement('option', { value: 'admin' }, '管理员')
        )
      ),
      React.createElement('div', { className: 'form-group' },
        React.createElement('label', null, '运营组'),
        React.createElement('select', { className: 'form-control', value: form.group_name, onChange: e => setForm(f => ({...f, group_name: e.target.value})) },
          React.createElement('option', { value: '一组' }, '一组'),
          React.createElement('option', { value: '二组' }, '二组'),
          React.createElement('option', { value: '三组' }, '三组')
        )
      )
    )
  );
}


// ============================================================
// TOAST COMPONENT
// ============================================================
function ToastContainer() {
  const [toasts, setToasts] = React.useState([]);
  _toastFn = (msg, type) => {
    const id = Date.now();
    setToasts(t => [...t, {id, msg, type: type||'success'}]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3000);
  };
  return React.createElement('div', {
    style: {position:'fixed',top:20,right:20,zIndex:9999,display:'flex',flexDirection:'column',gap:8}
  }, toasts.map(t => React.createElement('div', {
    key: t.id,
    style: {
      background: t.type==='error'?'#ff4d4f':t.type==='warning'?'#faad14':'#52c41a',
      color:'#fff',padding:'10px 16px',borderRadius:8,
      boxShadow:'0 4px 12px rgba(0,0,0,.15)',
      fontSize:13,fontWeight:500,minWidth:200,maxWidth:360
    }
  }, t.msg)));
}

// ============================================================
// ROOT APP
// ============================================================
function App() {
  const [authUser, setAuthUser] = React.useState(null);
  const [profile, setProfile] = React.useState(null);
  const [checking, setChecking] = React.useState(true);

  React.useEffect(() => {
    sb.auth.getSession().then(async ({ data: { session } }) => {
      if (session) {
        const { data: p } = await sb.from('users').select('*').eq('id', session.user.id).single();
        setAuthUser(session.user);
        setProfile(p);
      }
      setChecking(false);
    });
    const { data: { subscription } } = sb.auth.onAuthStateChange(async (event, session) => {
      if (event === 'SIGNED_OUT') { setAuthUser(null); setProfile(null); }
    });
    return () => subscription.unsubscribe();
  }, []);

  async function handleLogout() {
    await sb.auth.signOut();
    setAuthUser(null);
    setProfile(null);
  }

  if (checking) return React.createElement('div', {
    style: {display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh',background:'#f0f2f5'}
  }, React.createElement('div', { className: 'spinner', style: {width:40,height:40,borderWidth:3} }));

  return React.createElement('div', null,
    React.createElement(ToastContainer),
    !authUser || !profile
      ? React.createElement(LoginPage, { onLogin: (u, p) => { setAuthUser(u); setProfile(p); } })
      : React.createElement(AppLayout, { user: authUser, profile, onLogout: handleLogout })
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
